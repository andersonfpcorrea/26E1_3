# GitHub Actions — CI pipeline
#
# Security: no `run:` step consumes GitHub event data (PR titles, issue bodies,
# etc.), so there is no injection surface via triggers.
# Only versioned code is executed.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, tests and smoke-train
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      OMP_NUM_THREADS: "2"
      OPENBLAS_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      VECLIB_MAXIMUM_THREADS: "2"
      NUMEXPR_NUM_THREADS: "2"
      CARDIO_N_JOBS: "2"
      CARDIO_NICE: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src scripts tests

      - name: Unit tests (pytest)
        run: pytest -q -m "not slow"

      - name: Smoke train
        run: |
          python scripts/run_full_experiment.py \
              --models logistic_regression decision_tree \
              --dims none

      - name: Build Docker image
        run: docker build -t cardio-ml-api:ci .

      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 7
